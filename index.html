<!DOCTYPE html>
<html>
<head>
  <title>Roblox Admin Console</title>
  <style>
    body { background: black; color: #00ff00; font-family: monospace; font-size: 1.2em; padding: 20px; }
  </style>
</head>
<body>
<div id="terminal"></div>
<script>
const messages = [
  "Connecting to roblox.com mainframe...",
  "Searching for user database...",
  "Bypassing 2FA encryption...",
  "Access granted to admin panel.",
  "Downloading password hashes...",
  "ERROR: System compromised!",
  "Just kidding! 😄 Happy April Fools!"
];
let i = 0;
function type() {
  if (i < messages.length) {
    document.getElementById("terminal").innerHTML += "> " + messages[i] + "<br><br>";
    i++;
    setTimeout(type, 1200);
  }
}
type();
</script>
</body>
</html>
